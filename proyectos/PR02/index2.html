<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Phishing</title>
<link rel="stylesheet" href="quiz.css">
</head>

<body>

<div class="container">

<h1>Simulador de Phishing</h1>

<div id="start-screen">

<input id="alias" placeholder="Ingresa un alias">

<label>
<input type="checkbox" id="consent">
Acepto participar en esta simulación educativa
</label>

<button id="startBtn">Comenzar</button>

</div>


<div id="quiz" style="display:none">

<div id="progress"></div>

<div id="emailBox"></div>

<div id="options"></div>

<div id="feedback"></div>

<button id="nextBtn">Siguiente</button>

</div>


<div id="results" style="display:none">

<h2>Resultados</h2>

<div id="score"></div>

<h3>Ranking Global</h3>

<div id="ranking"></div>

<button onclick="location.reload()">Intentar nuevamente</button>

</div>

</div>

<script src="quiz.js"></script>

</body>
</html>
