<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Defense Quiz | CNO V Seguridad Informática</title>
    <link rel="icon" href="../../images/favicon.ico">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* AJUSTES DE CAPAS Y VISIBILIDAD */
        #quiz-section {
            position: relative;
            z-index: 9999 !important;
            margin: 120px auto 50px !important;
            padding: 20px;
            display: block !important;
        }

        #quiz-container {
            background: #10101a !important; /* Fondo sólido para evitar transparencias raras */
            border: 2px solid #c77dff !important;
            box-shadow: 0 0 30px rgba(199, 125, 255, 0.4) !important;
            border-radius: 15px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
            color: white !important;
            min-height: 400px;
        }

        /* Pantallas */
        .screen { display: none; }
        .screen.active { display: block !important; }

        /* Gmail Simulation (Visor de Correo) */
        .email-viewer {
            background: #ffffff !important;
            color: #202124 !important;
            border-radius: 8px;
            margin: 25px 0;
            text-align: left;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .email-header { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .subject { font-weight: bold; font-size: 1.1rem; color: #202124; margin-bottom: 4px; }
        .sender { font-size: 0.85rem; color: #5f6368; }
        .email-body { padding: 20px; color: #333; min-height: 120px; line-height: 1.5; }

        /* Botones y Acciones */
        .actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn-phishing { background: #ff4d4d !important; color: white !important; border: none; padding: 15px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .btn-legit { background: #4d94ff !important; color: white !important; border: none; padding: 15px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        
        /* Feedback estilo consola */
        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }
        .success-bg { background: rgba(0, 255, 150, 0.2); border: 1px solid #00ff96; color: #00ff96; }
        .error-bg { background: rgba(255, 80, 80, 0.2); border: 1px solid #ff5050; color: #ff5050; }

        .lab-tag { background: #7b2cbf; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; color: white; }
        
        .url-preview {
            position: fixed; bottom: 10px; left: 10px; background: black; color: #00ffd5;
            padding: 4px 10px; font-size: 12px; border-radius: 4px; opacity: 0; z-index: 10000;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="topbar">
        <div class="matrix-bg"></div>
        <a href="https://www.upslp.edu.mx/upslp/">
            <img src="../../images/upslp.jpg" alt="Logo universidad" class="logo-uni">
        </a>
        <a href="../index.html" class="btn-volver-top">← Volver</a>
        <a href="https://elisaaagh.github.io/">
            <img src="../../images/capi.png" alt="Foto estudiante" class="foto-alumna">
        </a>
    </div>

    <section class="actividad" id="quiz-section">
        <div id="quiz-container">
            
            <div id="start-screen" class="screen active">
                <h2 style="color: #c77dff;">Phishing Quiz: Entrenamiento @Apollo</h2>
                <p>Analiza los 10 correos y decide si son ataques o legítimos.</p>
                <ul style="margin: 20px 0; color: #c7c7ff; text-align: left;">
                    <li>Verifica el dominio del remitente.</li>
                    <li>Busca enlaces o archivos sospechosos.</li>
                    <li>Aprende de cada error para mejorar tu defensa.</li>
                </ul>
                <button class="btn-ver" onclick="startQuiz()" style="width: auto;">Iniciar Entrenamiento</button>
            </div>

            <div id="game-screen" class="screen">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <span id="progress" class="lab-tag">Cargando...</span>
                    <span id="score" style="color: #00ffd5; font-weight: bold;">Puntos: 0</span>
                </div>

                <div class="email-viewer">
                    <div class="email-header">
                        <div id="mail-subject" class="subject"></div>
                        <div id="mail-sender" class="sender"></div>
                    </div>
                    <div id="mail-content" class="email-body"></div>
                </div>

                <div id="feedback"></div>

                <div class="actions" id="action-buttons">
                    <button class="btn-phishing" onclick="checkAnswer(true)">Es Phishing</button>
                    <button class="btn-legit" onclick="checkAnswer(false)">Es Legítimo</button>
                </div>
                
                <button id="next-btn" class="btn-ver" style="display:none; margin-top: 20px;" onclick="nextQuestion()">
                    Siguiente Escenario →
                </button>
            </div>

            <div id="result-screen" class="screen">
                <h2 style="color: #c77dff;">Entrenamiento Completado</h2>
                <p id="final-stats" style="font-size: 1.2rem; margin: 20px 0;"></p>
                <button class="btn-ver" onclick="location.reload()" style="width: auto;">Reiniciar Misión</button>
            </div>
        </div>
    </section>

    <div id="browser-url-preview" class="url-preview"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
